site:
  name: BhummiVastu
  # site: 'https://amitkrmalik.github.io/bhummivastu'
  site: 'https://www.bhummivastu.com'
  # base: '/bhummivastu'
  trailingSlash: false

  googleSiteVerificationId: mdYML70cGjzyfx02JIPIN3I6C5km2qbtplNIxgPa9Vs
  social:
    facebook: 'https://www.facebook.com/BhummiVastu'
    instagram: 'https://www.instagram.com/bhummivastu'
    youtube: 'https://www.youtube.com/@BhummiVastu'

# Default SEO metadata
metadata:
  title:
    default: BhummiVastu — Vastu & Astrology Consultant in Bangalore
    template: '%s | BhummiVastu'
  description: 'BhummiVastu — Trusted Vastu and Astrology guidance by Vastu Acharya Minu Saini. Non-demolition Vastu, Vedic Astrology, and Astro-Vastu consultations.'
  robots:
    index: true
    follow: true
  openGraph:
    site_name: BhummiVastu
    images:
      - url: '~/assets/images/social-share-minu.jpeg'
        width: 640
        height: 800
    type: website
    locale: en_IN
    description: 'BhummiVastu — Trusted Vastu and Astrology guidance by Minu Saini. Non-demolition Vastu, Vedic Astrology, and Astro-Vastu consultations.'
  twitter:
    handle: '@bhummivastu'
    site: '@bhummivastu'
    cardType: summary_large_image
    description: 'BhummiVastu — Trusted Vastu and Astrology guidance by Minu Saini.'

i18n:
  language: en
  textDirection: ltr

apps:
  blog:
    isEnabled: true
    postsPerPage: 6

    post:
      isEnabled: true
      permalink: '/%slug%' # Variables: %slug%, %year%, %month%, %day%, %hour%, %minute%, %second%, %category%
      robots:
        index: true

    list:
      isEnabled: true
      pathname: 'blog' # Blog main path, you can change this to "articles" (/articles)
      robots:
        index: true

    category:
      isEnabled: true
      pathname: 'category' # Category main path /category/some-category, you can change this to "group" (/group/some-category)
      robots:
        index: true

    tag:
      isEnabled: true
      pathname: 'tag' # Tag main path /tag/some-tag, you can change this to "topics" (/topics/some-category)
      robots:
        index: false

    isRelatedPostsEnabled: true
    relatedPostsCount: 4

analytics:
  vendors:
    googleAnalytics:
      id: 'G-CPTPG0B5LN'

ui:
  theme: 'system' # Values: "system" | "light" | "dark" | "light:only" | "dark:only"
