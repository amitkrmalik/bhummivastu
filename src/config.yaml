site:
  name: BhummiVastu
  site: 'https://www.bhummivastu.com'
  base: '/'
  trailingSlash: false

  googleSiteVerificationId: orcPxI47GSa-cRvY11tUe6iGg2IO_RPvnA1q95iEM3M
  social:
    facebook: 'https://www.facebook.com/BhummiVastu'
    instagram: 'https://www.instagram.com/bhummivastu'

# Default SEO metadata
metadata:
  title:
    default: BhummiVastu — Vastu & Astrology Consultant in Bangalore
    template: '%s | BhummiVastu'
  description: "🏙️ Bhummi Vastu - Vastu consultancy and services in Bangalore. Serving all major locations within Bangalore including Indiranagar, Koramangala, Whitefield, Jayanagar, and more."
  robots:
    index: true
    follow: true
  openGraph:
    site_name: Bhummi Vastu Bangalore
    images:
      - url: '~/assets/images/default.png'
        width: 1200
        height: 628
    type: website
    locale: en_IN
    description: "Bhummi Vastu - Vastu consultancy and services in Bangalore. Serving Indiranagar, Koramangala, Whitefield, Jayanagar, and all Bangalore locations."
  twitter:
    handle: '@bhummivastu'
    site: '@bhummivastu'
    cardType: summary_large_image
    description: "Bhummi Vastu - Vastu consultancy and services in Bangalore."

i18n:
  language: en
  textDirection: ltr

apps:
  blog:
    isEnabled: true
    postsPerPage: 6

    post:
      isEnabled: true
      permalink: '/%slug%' # Variables: %slug%, %year%, %month%, %day%, %hour%, %minute%, %second%, %category%
      robots:
        index: true

    list:
      isEnabled: true
      pathname: 'blog' # Blog main path, you can change this to "articles" (/articles)
      robots:
        index: true

    category:
      isEnabled: true
      pathname: 'category' # Category main path /category/some-category, you can change this to "group" (/group/some-category)
      robots:
        index: true

    tag:
      isEnabled: true
      pathname: 'tag' # Tag main path /tag/some-tag, you can change this to "topics" (/topics/some-category)
      robots:
        index: false

    isRelatedPostsEnabled: true
    relatedPostsCount: 4

analytics:
  vendors:
    googleAnalytics:
      id: null # or "G-XXXXXXXXXX"

ui:
  theme: 'system' # Values: "system" | "light" | "dark" | "light:only" | "dark:only"
